<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nietzsche RAG Bot</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="page-background"></div>
    <div class="background-tint"></div>
    <div class="background-glow"></div>

    <main class="app-shell">
      <section class="chat-card">
        <header class="hero-header">
          <p class="eyebrow">A sharper conversation</p>
          <h1>Nietzsche RAG Bot</h1>
          <p class="description">
            Ask within the declared themes and the reply will stay grounded in the corpus.
          </p>
        </header>

        <section id="chat-feed" class="chat-feed" aria-live="polite"></section>

        <section class="suggestions-panel" aria-label="Suggested prompts">
          <p class="suggestions-title">Suggested themes</p>
          <div class="suggestions-list">
            <button
              class="suggestion-chip"
              type="button"
              data-prompt="I keep choosing comfort over difficulty and then I justify it."
            >
              Comfort over struggle
            </button>
            <button
              class="suggestion-chip"
              type="button"
              data-prompt="How would Nietzsche read my habit of making excuses for not acting?"
            >
              Excuse-making
            </button>
            <button
              class="suggestion-chip"
              type="button"
              data-prompt="Why do I keep conforming to the group even when I know better?"
            >
              Herd mentality
            </button>
            <button
              class="suggestion-chip"
              type="button"
              data-prompt="How does ressentiment distort the way a person judges strength?"
            >
              Ressentiment
            </button>
            <button
              class="suggestion-chip"
              type="button"
              data-prompt="What does becoming who you are demand beyond comfort and safety?"
            >
              Becoming who you are
            </button>
            <button
              class="suggestion-chip"
              type="button"
              data-prompt="What is the difference between real fatigue and fear of struggle?"
            >
              Fear of struggle
            </button>
          </div>
        </section>

        <form id="chat-form" class="chat-form">
          <label class="sr-only" for="message-input">Your message</label>
          <textarea
            id="message-input"
            name="message"
            rows="3"
            maxlength="2000"
            placeholder="Example: I keep choosing comfort over difficulty and then I rationalize it."
            required
          ></textarea>

          <div class="form-row">
            <p id="form-status" class="form-status"></p>
            <button id="send-button" type="submit">Send</button>
          </div>
        </form>
      </section>
    </main>

    <template id="user-message-template">
      <article class="message user">
        <div class="message-role">You</div>
        <div class="message-bubble">
          <p class="user-message-text"></p>
        </div>
      </article>
    </template>

    <template id="assistant-message-template">
      <article class="message assistant">
        <div class="message-role">Nietzsche RAG Bot</div>
        <div class="message-bubble">
          <div class="assistant-answer"></div>
          <div class="assistant-cards"></div>
          <div class="assistant-citations"></div>
        </div>
      </article>
    </template>

    <script src="/static/app.js"></script>
  </body>
</html>
